# mongodb-statefulset.yaml
# StatefulSet is used for databases because they need:
# - Stable network identity
# - Persistent storage that survives pod restarts

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: genesis-mongodb

spec:
  serviceName: mongodb
  replicas: 1    # only 1 for development — use 3 for production
  selector:
    matchLabels:
      app: mongodb
  
  template:
    metadata:
      labels:
        app: mongodb
    
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          
          ports:
            - containerPort: 27017
          
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genesis-secrets
                  key: mongo-password
          
          # Mount persistent storage
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
  
  # Persistent Volume Claim — data survives pod restarts
  volumeClaimTemplates:
    - metadata:
        name: mongodb-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi    # 5 gigabytes of storage