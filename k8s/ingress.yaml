# ingress.yaml
# Ingress is the entry point — routes incoming traffic to the right service
# / goes to frontend, /api goes to backend

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: genesis-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"    # allow file uploads

spec:
  rules:
    - host: genesis-platform.com    # replace with your actual domain
      http:
        paths:
          # All /api requests go to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          
          # Everything else goes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80