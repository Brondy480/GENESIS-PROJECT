# frontend-deployment.yaml
# Runs 2 copies of the frontend (Nginx serving React build)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: genesis-frontend
  labels:
    app: genesis-frontend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: genesis-frontend
  
  template:
    metadata:
      labels:
        app: genesis-frontend
    
    spec:
      containers:
        - name: frontend
          image: genesis-frontend:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - containerPort: 80
          
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10