

services:

  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: genesis-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: genesis_secret_2024
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - genesis-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genesis-backend
    restart: always
    environment:
      PORT: 8080
      NODE_ENV: production
      MONGO_URI: mongodb://admin:genesis_secret_2024@mongodb:27017/genesis?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 30d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      PAYMENT_MODE: mvp
    ports:
      - "8180:8080"
    depends_on:
      - mongodb
    networks:
      - genesis-network

  # Frontend
  frontend:
    build:
      context: ./frontend/genesis-frontend
      dockerfile: Dockerfile
    container_name: genesis-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - genesis-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: genesis-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - genesis-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: genesis-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: genesis_grafana_2024
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - genesis-network

volumes:
  mongodb_data:

networks:
  genesis-network:
    driver: bridge